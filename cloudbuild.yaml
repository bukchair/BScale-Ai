steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:latest'
      - '.'
    timeout: '1200s'

  # 2. Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:latest'

  # 3. Enable Secret Manager API and grant access to Cloud Run SA (idempotent)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud services enable secretmanager.googleapis.com
        PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
        SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
        for SECRET in ENCRYPTION_KEY SESSION_SIGNING_SECRET; do
          gcloud secrets add-iam-policy-binding $$SECRET \
            --member="serviceAccount:$$SA" \
            --role=roles/secretmanager.secretAccessor \
            --project=$PROJECT_ID || true
        done

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bscale'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--remove-env-vars=ENCRYPTION_KEY,SESSION_SIGNING_SECRET'
      - '--set-secrets=ENCRYPTION_KEY=ENCRYPTION_KEY:latest,SESSION_SIGNING_SECRET=SESSION_SIGNING_SECRET:latest'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:$COMMIT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bscale-ai/bscale:latest'

timeout: '1800s'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
